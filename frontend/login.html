<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Notes API</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f4f6fb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    }

    h1 { font-size: 1.5rem; margin-bottom: 0.25rem; color: #1a1a2e; }
    p.subtitle { color: #666; margin-bottom: 1.5rem; font-size: 0.9rem; }

    label { display: block; font-size: 0.85rem; font-weight: 600;
            color: #333; margin-bottom: 0.3rem; }

    input {
      width: 100%; padding: 0.65rem 0.9rem;
      border: 1.5px solid #ddd; border-radius: 8px;
      font-size: 1rem; margin-bottom: 1rem;
      transition: border-color 0.2s;
    }
    input:focus { outline: none; border-color: #4f46e5; }

    button {
      width: 100%; padding: 0.75rem;
      background: #4f46e5; color: white;
      border: none; border-radius: 8px;
      font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: background 0.2s;
    }
    button:hover { background: #4338ca; }
    button:disabled { background: #a5b4fc; cursor: not-allowed; }

    .error {
      background: #fef2f2; color: #dc2626;
      border: 1px solid #fecaca; border-radius: 8px;
      padding: 0.65rem 0.9rem; margin-bottom: 1rem;
      font-size: 0.9rem; display: none;
    }

    .link { text-align: center; margin-top: 1rem; font-size: 0.9rem; color: #666; }
    .link a { color: #4f46e5; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to your account</p>

    <div class="error" id="error"></div>

    <label for="email">Email</label>
    <input type="email" id="email" placeholder="you@example.com" />

    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Your password" />

    <button id="loginBtn">Sign in</button>

    <p class="link">No account? <a href="register.html">Create one</a></p>
  </div>

  <script src="api.js"></script>
  <script>
    // If already logged in, go straight to dashboard
    if (getAccessToken()) window.location.href = 'dashboard.html';

    const errorEl = document.getElementById('error');
    const loginBtn = document.getElementById('loginBtn');

    loginBtn.addEventListener('click', async () => {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      // Basic client-side validation
      if (!email || !password) {
        errorEl.textContent = 'Please fill in all fields.';
        errorEl.style.display = 'block';
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = 'Signing in...';
      errorEl.style.display = 'none';

      const data = await login(email, password);

      if (data.error) {
        errorEl.textContent = data.error;
        errorEl.style.display = 'block';
        loginBtn.disabled = false;
        loginBtn.textContent = 'Sign in';
        return;
      }

      // Save tokens and user info
      saveTokens(data.accessToken, data.refreshToken);
      localStorage.setItem('user', JSON.stringify(data.user));

      window.location.href = 'dashboard.html';
    });

    // Allow pressing Enter to submit
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') loginBtn.click();
    });
  </script>
</body>
</html>
